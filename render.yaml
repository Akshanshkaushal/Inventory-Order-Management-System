services:
  - type: web
    name: inventory-order-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-order-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: ENVIRONMENT
        value: production

databases:
  - name: inventory-order-db
    plan: free
